name: Rebuild Recipe Index

on:
  push:
    paths:
      - "recipes/**"
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build index.json
        run: node scripts/build-index.js

      - name: Commit and push index.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.json
          git diff --cached --quiet && echo "index.json unchanged, skipping commit." && exit 0
          git commit -m "ci: rebuild index.json [skip ci]"
          git push
