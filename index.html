<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Recipe Library</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --forest:    #1a3d2b;
      --green:     #2d6a4f;
      --sage:      #52b788;
      --mint:      #b7e4c7;
      --cream:     #faf7f2;
      --parchment: #f0ebe0;
      --paper:     #fffef9;
      --bark:      #7d5a3c;
      --ink:       #1c2118;
      --mist:      #8a9e8f;
      --border:    #d4cfc4;
      --red:       #c0392b;
      --serif:     'Playfair Display', Georgia, serif;
      --sans:      'DM Sans', system-ui, sans-serif;
      --mono:      'DM Mono', 'Menlo', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--sans);
      background: var(--cream);
      color: var(--ink);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      background: var(--forest);
      color: white;
      padding: 13px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      box-shadow: 0 2px 12px rgba(0,0,0,.2);
    }
    header h1 {
      font-family: var(--serif);
      font-size: 18px;
      font-weight: 700;
      flex: 1;
    }
    header .count {
      font-family: var(--mono);
      font-size: 11px;
      opacity: .5;
    }
    #btn-random {
      border: 1px solid rgba(255,255,255,.25);
      background: rgba(255,255,255,.1);
      color: white;
      border-radius: 8px;
      padding: 6px 13px;
      cursor: pointer;
      font-size: 12px;
      font-family: var(--sans);
      display: flex;
      align-items: center;
      gap: 5px;
    }
    #btn-random:hover { background: rgba(255,255,255,.2); }

    /* ── Search bar ── */
    .search-bar {
      background: var(--paper);
      border-bottom: 1px solid var(--border);
      padding: 10px 14px;
      flex-shrink: 0;
      position: relative;
    }
    .search-bar svg {
      position: absolute;
      left: 25px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--mist);
      pointer-events: none;
    }
    #search {
      width: 100%;
      padding: 9px 34px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--cream);
      font-size: 13px;
      font-family: var(--sans);
      color: var(--ink);
      outline: none;
      transition: border-color .15s;
    }
    #search:focus { border-color: var(--sage); }
    #search::placeholder { color: var(--mist); }

    /* ── Main scrollable area ── */
    main {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }
    main::-webkit-scrollbar { width: 5px; }
    main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Status messages ── */
    .status {
      text-align: center;
      padding: 60px 20px;
      color: var(--mist);
    }
    .status .icon { font-size: 48px; margin-bottom: 12px; }
    .status p { font-family: var(--serif); font-size: 18px; color: var(--ink); margin-bottom: 6px; }
    .status small { font-size: 12px; line-height: 1.8; }

    /* ── Recipe grid ── */
    #grid {
      display: grid;
      gap: 9px;
    }

    /* ── Recipe card ── */
    .card {
      background: var(--paper);
      border: 1px solid var(--border);
      border-left: 3px solid var(--sage);
      border-radius: 10px;
      padding: 14px 16px;
      cursor: pointer;
      transition: transform .14s ease, box-shadow .14s ease;
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(26,61,43,.1);
      border-color: var(--sage);
    }
    .card-source {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--bark);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }
    .card-title {
      font-family: var(--serif);
      font-size: 17px;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 7px;
      line-height: 1.3;
    }
    .card-meta {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 8px;
    }
    .card-meta span {
      font-size: 11px;
      color: var(--mist);
      display: flex;
      align-items: center;
      gap: 3px;
    }
    .tags {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }
    .tag {
      background: var(--parchment);
      color: var(--green);
      font-size: 10px;
      font-family: var(--mono);
      padding: 2px 8px;
      border-radius: 4px;
      border: 1px solid var(--border);
    }
    .tag.match {
      background: var(--mint);
      border-color: var(--sage);
    }

    /* ── Recipe detail ── */
    #detail { display: none; }
    #detail.visible { display: block; }
    #grid-view.hidden { display: none; }

    .detail-topbar {
      background: var(--paper);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    #btn-back {
      border: none;
      background: none;
      cursor: pointer;
      color: var(--green);
      font-weight: 600;
      font-family: var(--sans);
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 0;
    }
    #btn-back:hover { color: var(--forest); }

    .detail-content {
      padding: 20px 16px;
      max-width: 640px;
      margin: 0 auto;
    }
    .recipe-card {
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 22px 24px;
      box-shadow: 0 2px 12px rgba(26,61,43,.08);
    }

    /* Rendered markdown styles */
    .recipe-card h1 { font-family: var(--serif); font-size: 24px; color: var(--ink); margin-bottom: 4px; line-height: 1.2; }
    .recipe-card h2 { font-family: var(--sans); font-size: 12px; font-weight: 700; color: var(--green); margin: 20px 0 8px; text-transform: uppercase; letter-spacing: 1.2px; padding-bottom: 5px; border-bottom: 2px solid var(--mint); }
    .recipe-card h3 { font-family: var(--mono); font-size: 11px; font-weight: 600; color: var(--sage); margin: 14px 0 5px; text-transform: uppercase; letter-spacing: .8px; }
    .recipe-card ul { padding-left: 20px; }
    .recipe-card li { font-size: 14px; line-height: 1.7; margin: 3px 0; }
    .recipe-card p { font-size: 14px; line-height: 1.6; margin: 3px 0; }
    .recipe-card .rml { display: none; }

    .detail-pills {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid var(--parchment);
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--mint);
      color: var(--green);
      font-size: 11px;
      font-family: var(--sans);
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 500;
    }
    .pill.source { background: #fef5e4; color: var(--bark); }
    .detail-filename {
      margin-top: 10px;
      font-size: 10px;
      color: var(--border);
      font-family: var(--mono);
    }
    .detail-tags {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    /* ── Result count ── */
    #result-count {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--mist);
      margin-bottom: 8px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fadein { animation: fadeIn .2s ease both; }
  </style>
</head>
<body>

  <header>
    <span style="font-size:20px">🍳</span>
    <h1>Recipe Library <span class="count" id="header-count"></span></h1>
    <button id="btn-random" title="Random recipe">&#9684; Random</button>
  </header>

  <div class="search-bar">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input id="search" type="search" placeholder='Search ingredients, tags, cuisine… "chicken", "italian", "30min"' autocomplete="off" spellcheck="false"/>
  </div>

  <main>
    <!-- Library view -->
    <div id="grid-view">
      <div id="result-count"></div>
      <div id="grid"></div>
      <div id="status" class="status" style="display:none"></div>
    </div>

    <!-- Detail view -->
    <div id="detail">
      <div class="detail-topbar">
        <button id="btn-back">&#8592; Library</button>
        <span id="detail-filename-top" style="font-family:var(--mono);font-size:10px;color:var(--mist)"></span>
      </div>
      <div class="detail-content">
        <div class="recipe-card">
          <div id="detail-body"></div>
          <div class="detail-pills" id="detail-pills"></div>
          <div class="detail-tags" id="detail-tags"></div>
          <div class="detail-filename" id="detail-filename-bottom"></div>
        </div>
      </div>
    </div>
  </main>

<script>
  // ── State ─────────────────────────────────────────────────
  let allRecipes = [];
  let currentQuery = "";

  // ── Fetch index.json ──────────────────────────────────────
  async function loadRecipes() {
    setStatus("loading", "Loading recipes…");
    try {
      const res = await fetch("index.json?" + Date.now()); // bust cache
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      allRecipes = await res.json();
      document.getElementById("header-count").textContent =
        `— ${allRecipes.length} recipe${allRecipes.length !== 1 ? "s" : ""}`;
      renderList(allRecipes);
    } catch (err) {
      setStatus("error",
        "Could not load index.json",
        err.message.includes("404")
          ? "Run the build script first: node scripts/build-index.js"
          : err.message
      );
    }
  }

  // ── Markdown → HTML ───────────────────────────────────────
  function esc(s) {
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }
  function inl(s) {
    return esc(s)
      .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
      .replace(/\*(.+?)\*/g, "<em>$1</em>");
  }
  function renderMD(md) {
    const out = []; let ul = false;
    const cl = () => { if (ul) { out.push("</ul>"); ul = false; } };
    for (const ln of md.split("\n")) {
      if      (/^# /.test(ln))   { cl(); out.push(`<h1>${esc(ln.slice(2))}</h1>`); }
      else if (/^## /.test(ln))  { cl(); out.push(`<h2>${esc(ln.slice(3))}</h2>`); }
      else if (/^### /.test(ln)) { cl(); out.push(`<h3>${esc(ln.slice(4))}</h3>`); }
      else if (/^- /.test(ln))   {
        if (!ul) { out.push("<ul>"); ul = true; }
        out.push(`<li>${inl(ln.slice(2))}</li>`);
      }
      else if (/^(tags|time|serves|source):/i.test(ln)) {
        cl();
        const [k, ...v] = ln.split(":");
        out.push(`<div class="rml">${esc(k)}: ${esc(v.join(":").trim())}</div>`);
      }
      else if (ln.trim()) { cl(); out.push(`<p>${inl(ln)}</p>`); }
      else cl();
    }
    cl();
    return out.join("");
  }

  // ── Search & Score ────────────────────────────────────────
  function score(r, q) {
    const ql = q.toLowerCase();
    return (r.title.toLowerCase().includes(ql) ? 3 : 0)
         + (r.tags.join(" ").toLowerCase().includes(ql) ? 2 : 0)
         + ((r.ingredients || []).join(" ").toLowerCase().includes(ql) ? 1 : 0)
         + (r.markdown.toLowerCase().includes(ql) ? 1 : 0);
  }

  function search(q) {
    if (!q.trim()) return allRecipes;
    return allRecipes
      .map(r => ({ ...r, _score: score(r, q) }))
      .filter(r => r._score > 0)
      .sort((a, b) => b._score - a._score);
  }

  // ── Render list ───────────────────────────────────────────
  function renderList(recipes) {
    const grid   = document.getElementById("grid");
    const count  = document.getElementById("result-count");
    const status = document.getElementById("status");

    grid.innerHTML = "";
    status.style.display = "none";

    if (recipes.length === 0) {
      count.textContent = "";
      if (currentQuery) {
        setStatus("empty", `No recipes match "${currentQuery}"`, "Try a different ingredient or tag");
      } else {
        setStatus("empty", "Library is empty", "Add .md files to recipes/ and push to rebuild.");
      }
      return;
    }

    count.textContent = currentQuery
      ? `${recipes.length} result${recipes.length !== 1 ? "s" : ""} for "${currentQuery}"`
      : "";

    const frag = document.createDocumentFragment();
    for (const r of recipes) {
      frag.appendChild(makeCard(r));
    }
    grid.appendChild(frag);
  }

  function makeCard(r) {
    const el = document.createElement("div");
    el.className = "card fadein";

    const tags = (r.tags || []).slice(0, 5);
    const ql = currentQuery.toLowerCase();

    el.innerHTML = `
      ${r.source ? `<div class="card-source">${esc(r.source)}</div>` : ""}
      <div class="card-title">${esc(r.title)}</div>
      <div class="card-meta">
        ${r.time   ? `<span>🕐 ${esc(r.time)}</span>` : ""}
        ${r.serves ? `<span>👤 ${esc(r.serves)}</span>` : ""}
      </div>
      <div class="tags">
        ${tags.map(t => `<span class="tag${ql && t.toLowerCase().includes(ql) ? " match" : ""}">${esc(t)}</span>`).join("")}
      </div>
    `;
    el.addEventListener("click", () => showDetail(r));
    return el;
  }

  // ── Detail view ───────────────────────────────────────────
  function showDetail(r) {
    document.getElementById("grid-view").classList.add("hidden");
    document.getElementById("detail").classList.add("visible");
    document.getElementById("detail-body").innerHTML = renderMD(r.markdown);

    // Pills
    const pills = document.getElementById("detail-pills");
    pills.innerHTML = [
      r.time   ? `<span class="pill">🕐 ${esc(r.time)}</span>` : "",
      r.serves ? `<span class="pill">👤 ${esc(r.serves)} servings</span>` : "",
      r.source ? `<span class="pill source">${esc(r.source)}</span>` : "",
    ].join("");

    // Tags
    const tagsEl = document.getElementById("detail-tags");
    tagsEl.innerHTML = (r.tags || [])
      .map(t => `<span class="tag">${esc(t)}</span>`)
      .join("");

    // Filename
    const fn = `📄 ${r.filename}`;
    document.getElementById("detail-filename-top").textContent = r.filename;
    document.getElementById("detail-filename-bottom").textContent = fn;

    // Scroll to top
    document.querySelector("main").scrollTo(0, 0);
  }

  function showList() {
    document.getElementById("grid-view").classList.remove("hidden");
    document.getElementById("detail").classList.remove("visible");
  }

  // ── Status helper ─────────────────────────────────────────
  function setStatus(type, heading, detail) {
    const icons = { loading: "⏳", error: "⚠️", empty: "🌿" };
    const el = document.getElementById("status");
    el.style.display = "block";
    el.innerHTML = `
      <div class="icon">${icons[type] || "🍳"}</div>
      <p>${heading}</p>
      ${detail ? `<small>${detail}</small>` : ""}
    `;
  }

  // ── Event listeners ───────────────────────────────────────
  document.getElementById("search").addEventListener("input", e => {
    currentQuery = e.target.value;
    renderList(search(currentQuery));
  });

  document.getElementById("btn-back").addEventListener("click", showList);

  document.getElementById("btn-random").addEventListener("click", () => {
    if (!allRecipes.length) return;
    showDetail(allRecipes[Math.floor(Math.random() * allRecipes.length)]);
  });

  document.addEventListener("keydown", e => {
    if (e.key === "Escape") showList();
    if (e.key === "/" && document.getElementById("detail").style.display === "none") {
      e.preventDefault();
      document.getElementById("search").focus();
    }
  });

  // ── Boot ──────────────────────────────────────────────────
  loadRecipes();
</script>
</body>
</html>
