<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Recipe Library</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --forest:    #1a3d2b;
      --green:     #2d6a4f;
      --sage:      #52b788;
      --mint:      #b7e4c7;
      --cream:     #faf7f2;
      --parchment: #f0ebe0;
      --paper:     #fffef9;
      --bark:      #7d5a3c;
      --ink:       #1c2118;
      --mist:      #8a9e8f;
      --border:    #d4cfc4;
      --red:       #c0392b;
      --serif:     'Playfair Display', Georgia, serif;
      --sans:      'DM Sans', system-ui, sans-serif;
      --mono:      'DM Mono', 'Menlo', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--sans);
      background: var(--cream);
      color: var(--ink);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      background: var(--forest);
      color: white;
      padding: 13px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      box-shadow: 0 2px 12px rgba(0,0,0,.2);
    }
    header h1 {
      font-family: var(--serif);
      font-size: 18px;
      font-weight: 700;
      flex: 1;
    }
    header .count {
      font-family: var(--mono);
      font-size: 11px;
      opacity: .5;
    }
    #btn-random {
      border: 1px solid rgba(255,255,255,.25);
      background: rgba(255,255,255,.1);
      color: white;
      border-radius: 8px;
      padding: 6px 13px;
      cursor: pointer;
      font-size: 12px;
      font-family: var(--sans);
      display: flex;
      align-items: center;
      gap: 5px;
    }
    #btn-random:hover { background: rgba(255,255,255,.2); }

    /* ── Search bar ── */
    .search-bar {
      background: var(--paper);
      border-bottom: 1px solid var(--border);
      padding: 10px 14px;
      flex-shrink: 0;
      position: relative;
    }
    .search-bar svg {
      position: absolute;
      left: 25px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--mist);
      pointer-events: none;
    }
    #search {
      width: 100%;
      padding: 9px 34px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--cream);
      font-size: 13px;
      font-family: var(--sans);
      color: var(--ink);
      outline: none;
      transition: border-color .15s;
    }
    #search:focus { border-color: var(--sage); }
    #search::placeholder { color: var(--mist); }

    /* ── Main scrollable area ── */
    main {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }
    main::-webkit-scrollbar { width: 5px; }
    main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Status messages ── */
    .status {
      text-align: center;
      padding: 60px 20px;
      color: var(--mist);
    }
    .status .icon { font-size: 48px; margin-bottom: 12px; }
    .status p { font-family: var(--serif); font-size: 18px; color: var(--ink); margin-bottom: 6px; }
    .status small { font-size: 12px; line-height: 1.8; }

    /* ── Recipe grid ── */
    #grid {
      display: grid;
      gap: 9px;
    }

    /* ── Recipe card ── */
    .card {
      background: var(--paper);
      border: 1px solid var(--border);
      border-left: 3px solid var(--sage);
      border-radius: 10px;
      padding: 14px 16px;
      cursor: pointer;
      transition: transform .14s ease, box-shadow .14s ease;
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(26,61,43,.1);
      border-color: var(--sage);
    }
    .card-source {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--bark);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }
    .card-title {
      font-family: var(--serif);
      font-size: 17px;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 7px;
      line-height: 1.3;
    }
    .card-meta {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 8px;
    }
    .card-meta span {
      font-size: 11px;
      color: var(--mist);
      display: flex;
      align-items: center;
      gap: 3px;
    }
    .tags {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }
    .tag {
      background: var(--parchment);
      color: var(--green);
      font-size: 10px;
      font-family: var(--mono);
      padding: 2px 8px;
      border-radius: 4px;
      border: 1px solid var(--border);
    }
    .tag.match {
      background: var(--mint);
      border-color: var(--sage);
    }

    /* ── Recipe detail ── */
    #detail { display: none; }
    #detail.visible { display: block; }
    #grid-view.hidden { display: none; }

    .detail-topbar {
      background: var(--paper);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    #btn-back {
      border: none;
      background: none;
      cursor: pointer;
      color: var(--green);
      font-weight: 600;
      font-family: var(--sans);
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 0;
    }
    #btn-back:hover { color: var(--forest); }

    .detail-content {
      padding: 20px 16px;
      max-width: 640px;
      margin: 0 auto;
    }
    .recipe-card {
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 22px 24px;
      box-shadow: 0 2px 12px rgba(26,61,43,.08);
    }

    /* Rendered markdown styles */
    .recipe-card h1 { font-family: var(--serif); font-size: 24px; color: var(--ink); margin-bottom: 4px; line-height: 1.2; }
    .recipe-card h2 { font-family: var(--sans); font-size: 12px; font-weight: 700; color: var(--green); margin: 20px 0 8px; text-transform: uppercase; letter-spacing: 1.2px; padding-bottom: 5px; border-bottom: 2px solid var(--mint); }
    .recipe-card h3 { font-family: var(--mono); font-size: 11px; font-weight: 600; color: var(--sage); margin: 14px 0 5px; text-transform: uppercase; letter-spacing: .8px; }
    .recipe-card ul { padding-left: 20px; }
    .recipe-card li { font-size: 14px; line-height: 1.7; margin: 3px 0; }
    .recipe-card p { font-size: 14px; line-height: 1.6; margin: 3px 0; }
    .recipe-card .rml { display: none; }

    .detail-pills {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid var(--parchment);
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--mint);
      color: var(--green);
      font-size: 11px;
      font-family: var(--sans);
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 500;
    }
    .pill.source { background: #fef5e4; color: var(--bark); }
    .detail-filename {
      margin-top: 10px;
      font-size: 10px;
      color: var(--border);
      font-family: var(--mono);
    }
    .detail-tags {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    /* ── Result count ── */
    #result-count {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--mist);
      margin-bottom: 8px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fadein { animation: fadeIn .2s ease both; }

    /* ── Card selection ── */
    .card { position: relative; }
    .card-title { padding-right: 32px; }
    .card-select {
      position: absolute; top: 10px; right: 10px;
      width: 22px; height: 22px; border-radius: 50%;
      border: 2px solid var(--border); background: var(--paper);
      cursor: pointer; font-size: 12px; color: transparent;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s; line-height: 1; padding: 0;
    }
    .card-select:hover { border-color: var(--sage); }
    .card.selected .card-select { border-color: var(--sage); background: var(--sage); color: white; }
    .card.selected { border-left-color: var(--green); background: #f3faf6; }

    /* ── Selection bar ── */
    #selection-bar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
      background: var(--forest); color: white;
      padding: 11px 16px; display: flex; align-items: center; gap: 10px;
      box-shadow: 0 -2px 12px rgba(0,0,0,.25);
    }
    #selection-bar .sel-label { flex: 1; font-size: 13px; }
    .sel-btn {
      border: 1px solid rgba(255,255,255,.3); background: rgba(255,255,255,.1);
      color: white; border-radius: 8px; padding: 6px 13px;
      cursor: pointer; font-size: 12px; font-family: var(--sans);
    }
    .sel-btn:hover { background: rgba(255,255,255,.2); }
    .sel-btn.primary { background: var(--sage); border-color: var(--sage); color: var(--forest); font-weight: 600; }
    .sel-btn.primary:hover { background: var(--mint); }

    /* ── Grocery view ── */
    #grocery { display: none; }
    #grocery.visible { display: block; }
    .grocery-card {
      background: var(--paper); border: 1px solid var(--border);
      border-radius: 12px; padding: 22px 24px;
      box-shadow: 0 2px 12px rgba(26,61,43,.08);
    }
    .grocery-card h2 { font-family: var(--sans); font-size: 12px; font-weight: 700; color: var(--green); margin: 0 0 4px; text-transform: uppercase; letter-spacing: 1.2px; padding-bottom: 0; border-bottom: none; }
    .grocery-subtitle { font-family: var(--serif); font-size: 18px; font-weight: 700; color: var(--ink); margin-bottom: 16px; line-height: 1.3; }
    .grocery-list { list-style: none; padding: 0; margin: 0; }
    .grocery-item { display: flex; align-items: flex-start; gap: 10px; padding: 7px 0; border-bottom: 1px solid var(--parchment); font-size: 14px; line-height: 1.4; }
    .grocery-item:last-child { border-bottom: none; }
    .grocery-item input[type=checkbox] { margin-top: 2px; accent-color: var(--sage); flex-shrink: 0; width: 15px; height: 15px; cursor: pointer; }
    .grocery-item label { cursor: pointer; }
    .grocery-item.checked label { text-decoration: line-through; color: var(--mist); }

    @media print {
      header, .search-bar, #selection-bar, .detail-topbar { display: none !important; }
      body { overflow: visible; height: auto; }
      main { overflow: visible; }
      .grocery-item input[type=checkbox] { display: none; }
    }
  </style>
</head>
<body>

  <header>
    <span style="font-size:20px">🍳</span>
    <h1>Recipe Library <span class="count" id="header-count"></span></h1>
    <button id="btn-random" title="Random recipe">&#9684; Random</button>
  </header>

  <div class="search-bar">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input id="search" type="search" placeholder='Search ingredients, tags, cuisine… "chicken", "italian", "30min"' autocomplete="off" spellcheck="false"/>
  </div>

  <main>
    <!-- Library view -->
    <div id="grid-view">
      <div id="result-count"></div>
      <div id="grid"></div>
      <div id="status" class="status" style="display:none"></div>
    </div>

    <!-- Detail view -->
    <div id="detail">
      <div class="detail-topbar">
        <button id="btn-back">&#8592; Library</button>
        <span id="detail-filename-top" style="font-family:var(--mono);font-size:10px;color:var(--mist)"></span>
      </div>
      <div class="detail-content">
        <div class="recipe-card">
          <div id="detail-body"></div>
          <div class="detail-pills" id="detail-pills"></div>
          <div class="detail-tags" id="detail-tags"></div>
          <div class="detail-filename" id="detail-filename-bottom"></div>
        </div>
      </div>
    </div>

    <!-- Grocery list view -->
    <div id="grocery">
      <div class="detail-topbar">
        <button id="btn-back-grocery">&#8592; Library</button>
        <button id="btn-print" class="sel-btn" style="border-color:var(--border);background:none;color:var(--green)">&#128438; Print</button>
      </div>
      <div class="detail-content">
        <div class="grocery-card">
          <h2>Shopping List</h2>
          <div class="grocery-subtitle" id="grocery-title"></div>
          <ul class="grocery-list" id="grocery-items"></ul>
        </div>
      </div>
    </div>
  </main>

  <div id="selection-bar" style="display:none">
    <span class="sel-label" id="sel-count"></span>
    <button class="sel-btn" id="btn-clear-sel">Clear</button>
    <button class="sel-btn primary" id="btn-gen-list">Shopping List &#8594;</button>
  </div>

<script>
  // ── State ─────────────────────────────────────────────────
  let allRecipes = [];
  let currentQuery = "";
  const selectedRecipes = new Set();
  const MAX_SELECT = 5;

  // ── Fetch index.json ──────────────────────────────────────
  async function loadRecipes() {
    setStatus("loading", "Loading recipes…");
    try {
      const res = await fetch("index.json?" + Date.now()); // bust cache
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      allRecipes = await res.json();
      document.getElementById("header-count").textContent =
        `— ${allRecipes.length} recipe${allRecipes.length !== 1 ? "s" : ""}`;
      renderList(allRecipes);
    } catch (err) {
      setStatus("error",
        "Could not load index.json",
        err.message.includes("404")
          ? "Run the build script first: node scripts/build-index.js"
          : err.message
      );
    }
  }

  // ── Markdown → HTML ───────────────────────────────────────
  function esc(s) {
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }
  function inl(s) {
    return esc(s)
      .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
      .replace(/\*(.+?)\*/g, "<em>$1</em>");
  }
  function renderMD(md) {
    const out = []; let ul = false;
    const cl = () => { if (ul) { out.push("</ul>"); ul = false; } };
    for (const ln of md.split("\n")) {
      if      (/^# /.test(ln))   { cl(); out.push(`<h1>${esc(ln.slice(2))}</h1>`); }
      else if (/^## /.test(ln))  { cl(); out.push(`<h2>${esc(ln.slice(3))}</h2>`); }
      else if (/^### /.test(ln)) { cl(); out.push(`<h3>${esc(ln.slice(4))}</h3>`); }
      else if (/^- /.test(ln))   {
        if (!ul) { out.push("<ul>"); ul = true; }
        out.push(`<li>${inl(ln.slice(2))}</li>`);
      }
      else if (/^(tags|time|serves|source):/i.test(ln)) {
        cl();
        const [k, ...v] = ln.split(":");
        out.push(`<div class="rml">${esc(k)}: ${esc(v.join(":").trim())}</div>`);
      }
      else if (ln.trim()) { cl(); out.push(`<p>${inl(ln)}</p>`); }
      else cl();
    }
    cl();
    return out.join("");
  }

  // ── Search & Score ────────────────────────────────────────
  function score(r, q) {
    const ql = q.toLowerCase();
    return (r.title.toLowerCase().includes(ql) ? 3 : 0)
         + (r.tags.join(" ").toLowerCase().includes(ql) ? 2 : 0)
         + ((r.ingredients || []).join(" ").toLowerCase().includes(ql) ? 1 : 0)
         + (r.markdown.toLowerCase().includes(ql) ? 1 : 0);
  }

  function search(q) {
    if (!q.trim()) return allRecipes;
    return allRecipes
      .map(r => ({ ...r, _score: score(r, q) }))
      .filter(r => r._score > 0)
      .sort((a, b) => b._score - a._score);
  }

  // ── Render list ───────────────────────────────────────────
  function renderList(recipes) {
    const grid   = document.getElementById("grid");
    const count  = document.getElementById("result-count");
    const status = document.getElementById("status");

    grid.innerHTML = "";
    status.style.display = "none";

    if (recipes.length === 0) {
      count.textContent = "";
      if (currentQuery) {
        setStatus("empty", `No recipes match "${currentQuery}"`, "Try a different ingredient or tag");
      } else {
        setStatus("empty", "Library is empty", "Add .md files to recipes/ and push to rebuild.");
      }
      return;
    }

    count.textContent = currentQuery
      ? `${recipes.length} result${recipes.length !== 1 ? "s" : ""} for "${currentQuery}"`
      : "";

    const frag = document.createDocumentFragment();
    for (const r of recipes) {
      frag.appendChild(makeCard(r));
    }
    grid.appendChild(frag);
  }

  function makeCard(r) {
    const el = document.createElement("div");
    el.className = "card fadein";
    if (selectedRecipes.has(r.filename)) el.classList.add("selected");

    const tags = (r.tags || []).slice(0, 5);
    const ql = currentQuery.toLowerCase();

    el.innerHTML = `
      <button class="card-select" title="Select for shopping list">${selectedRecipes.has(r.filename) ? '✓' : ''}</button>
      ${r.source ? `<div class="card-source">${esc(r.source)}</div>` : ""}
      <div class="card-title">${esc(r.title)}</div>
      <div class="card-meta">
        ${r.time   ? `<span>🕐 ${esc(r.time)}</span>` : ""}
        ${r.serves ? `<span>👤 ${esc(r.serves)}</span>` : ""}
      </div>
      <div class="tags">
        ${tags.map(t => `<span class="tag${ql && t.toLowerCase().includes(ql) ? " match" : ""}">${esc(t)}</span>`).join("")}
      </div>
    `;
    el.querySelector('.card-select').addEventListener('click', e => toggleSelect(r, el, e));
    el.addEventListener("click", () => showDetail(r));
    return el;
  }

  // ── Detail view ───────────────────────────────────────────
  function showDetail(r) {
    document.getElementById("grid-view").classList.add("hidden");
    document.getElementById("detail").classList.add("visible");
    document.getElementById("detail-body").innerHTML = renderMD(r.markdown);

    // Pills
    const pills = document.getElementById("detail-pills");
    pills.innerHTML = [
      r.time   ? `<span class="pill">🕐 ${esc(r.time)}</span>` : "",
      r.serves ? `<span class="pill">👤 ${esc(r.serves)} servings</span>` : "",
      r.source ? `<span class="pill source">${esc(r.source)}</span>` : "",
    ].join("");

    // Tags
    const tagsEl = document.getElementById("detail-tags");
    tagsEl.innerHTML = (r.tags || [])
      .map(t => `<span class="tag">${esc(t)}</span>`)
      .join("");

    // Filename
    const fn = `📄 ${r.filename}`;
    document.getElementById("detail-filename-top").textContent = r.filename;
    document.getElementById("detail-filename-bottom").textContent = fn;

    // Scroll to top
    document.querySelector("main").scrollTo(0, 0);
  }

  function showList() {
    document.getElementById("grid-view").classList.remove("hidden");
    document.getElementById("detail").classList.remove("visible");
  }

  // ── Grocery: ingredient parsing & consolidation ───────────
  function extractIngredients(md) {
    const lines = md.split('\n');
    let inSection = false;
    const result = [];
    for (const ln of lines) {
      if (/^## ingredients/i.test(ln)) { inSection = true; continue; }
      if (/^##/.test(ln) && inSection) break;
      if (inSection && /^-\s/.test(ln)) result.push(ln.replace(/^-\s+/, '').trim());
    }
    return result;
  }

  function parseAmount(s) {
    if (!s) return null;
    s = s.trim();
    if (/^\d+\s+\d+\/\d+$/.test(s)) {
      const [w, f] = s.split(' ');
      const [n, d] = f.split('/');
      return parseInt(w) + parseInt(n) / parseInt(d);
    }
    if (s.includes('/')) { const [n, d] = s.split('/'); return parseInt(n) / parseInt(d); }
    return parseFloat(s);
  }

  const UNITS_RE = /^(packages?|packs?|cups?|tbsps?|tablespoons?|tsps?|teaspoons?|oz|ounces?|grams?|g|kg|lbs?|pounds?|ml|litres?|liters?|cloves?|cans?|heads?|bunche?s?|stalks?|slices?|pieces?|sprigs?|sheets?)\s+/i;
  const UNIT_NORM = { packages:'package', packs:'package', pack:'package', cups:'cup', tbsps:'tbsp', tablespoon:'tbsp', tablespoons:'tbsp', tsps:'tsp', teaspoon:'tsp', teaspoons:'tsp', ounces:'oz', ounce:'oz', grams:'g', gram:'g', lbs:'lb', pounds:'lb', pound:'lb', litres:'l', liters:'l', cloves:'clove', cans:'can', heads:'head', bunches:'bunch', stalks:'stalk', slices:'slice', pieces:'piece', sprigs:'sprig', sheets:'sheet' };

  function parseIngredient(line) {
    line = line.trim().replace(/^approx\.?\s+/i, '');
    const amtM = line.match(/^(\d+(?:\s+\d+\/\d+|\/\d+)?)\s+/);
    let amount = null, rest = line;
    if (amtM) { amount = parseAmount(amtM[1]); rest = line.slice(amtM[0].length); }
    const unitM = rest.match(UNITS_RE);
    let unit = null;
    if (unitM) {
      unit = UNIT_NORM[unitM[1].toLowerCase()] ?? unitM[1].toLowerCase().replace(/s$/, '');
      rest = rest.slice(unitM[0].length);
    }
    return { amount, unit, name: rest.trim().toLowerCase() };
  }

  function normalizeTspTbsp(p) {
    // Normalize tbsp → tsp so mixed-unit ingredients combine cleanly (1 tbsp = 3 tsp)
    if (p.unit === 'tbsp' && p.amount !== null) return { ...p, amount: p.amount * 3, unit: 'tsp' };
    return p;
  }

  function consolidate(lines) {
    const groups = new Map();
    for (const line of lines) {
      const p = normalizeTspTbsp(parseIngredient(line));
      const key = (p.unit ?? '') + '|' + p.name;
      if (groups.has(key)) {
        const g = groups.get(key);
        if (g.amount !== null && p.amount !== null) g.amount += p.amount;
        // both null → dedup silently
      } else {
        groups.set(key, { ...p });
      }
    }
    return [...groups.values()].sort((a, b) => a.name.localeCompare(b.name));
  }

  const FRAC_MAP = { 0.5:'½', 0.25:'¼', 0.75:'¾', 0.333:'⅓', 0.667:'⅔', 0.125:'⅛' };
  function fmtAmount(n) {
    if (n === null) return '';
    const w = Math.floor(n), f = Math.round((n - w) * 1000) / 1000;
    const fs = FRAC_MAP[f] ?? (f > 0 ? n.toFixed(2) : '');
    return ((w > 0 ? String(w) : '') + fs) || String(n);
  }
  const NO_PLURAL = new Set(['g','kg','lb','oz','ml','l','tbsp','tsp']);
  function formatIngredient(item) {
    let { amount, unit, name } = item;
    // If stored in tsp and a clean multiple of 3, display as tbsp
    if (unit === 'tsp' && amount !== null) {
      const rounded = Math.round(amount * 1000) / 1000;
      if (rounded >= 3 && Math.abs(Math.round(rounded / 3) * 3 - rounded) < 0.001) {
        amount = rounded / 3;
        unit = 'tbsp';
      }
    }
    const parts = [];
    if (amount !== null) parts.push(fmtAmount(amount));
    if (unit) {
      const plural = amount !== null && amount > 1 && !NO_PLURAL.has(unit);
      parts.push(plural ? unit + 's' : unit);
    }
    parts.push(name);
    return parts.filter(Boolean).join(' ');
  }

  // ── Grocery: pantry ignore list ──────────────────────────
  const GROCERY_IGNORE_TERMS = [
    'olive oil', 'sesame oil', 'red pepper flakes', 'salt',
    'black pepper', 'baking powder', 'ancho powder', 'chili powder',
    'all-purpose flour', 'egg',
  ];

  function isGroceryIgnored(name) {
    // Strip parenthetical descriptions before matching so e.g.
    // "flour spice blend (2 tbsp flour…)" doesn't match "flour"
    const n = name.toLowerCase().replace(/\(.*?\)/g, '').trim();
    if (n.includes('peanut')) return false;  // keep peanut butter
    if (/\bbutter\b/.test(n)) return true;   // butter (not buttermilk — no word boundary)
    return GROCERY_IGNORE_TERMS.some(t => n.includes(t));
  }

  // ── Grocery: selection UI ─────────────────────────────────
  function toggleSelect(r, cardEl, e) {
    e.stopPropagation();
    const btn = cardEl.querySelector('.card-select');
    if (!selectedRecipes.has(r.filename) && selectedRecipes.size >= MAX_SELECT) {
      btn.style.borderColor = 'var(--red)';
      setTimeout(() => btn.style.borderColor = '', 600);
      return;
    }
    if (selectedRecipes.has(r.filename)) {
      selectedRecipes.delete(r.filename);
      cardEl.classList.remove('selected');
      btn.textContent = '';
    } else {
      selectedRecipes.add(r.filename);
      cardEl.classList.add('selected');
      btn.textContent = '✓';
    }
    updateSelectionBar();
  }

  function updateSelectionBar() {
    const bar = document.getElementById('selection-bar');
    const n = selectedRecipes.size;
    bar.style.display = n > 0 ? 'flex' : 'none';
    document.getElementById('sel-count').textContent =
      `${n} of ${MAX_SELECT} recipe${n !== 1 ? 's' : ''} selected`;
  }

  function showGrocery() {
    const recipes = allRecipes.filter(r => selectedRecipes.has(r.filename));
    const allLines = recipes.flatMap(r => extractIngredients(r.markdown));
    const items = consolidate(allLines).filter(item => !isGroceryIgnored(item.name));

    document.getElementById('grocery-title').textContent =
      recipes.map(r => r.title).join(' · ');

    const ul = document.getElementById('grocery-items');
    ul.innerHTML = '';
    items.forEach((item, i) => {
      const li = document.createElement('li');
      li.className = 'grocery-item';
      const id = `gi-${i}`;
      li.innerHTML = `<input type="checkbox" id="${id}"><label for="${id}">${esc(formatIngredient(item))}</label>`;
      li.querySelector('input').addEventListener('change', e => {
        li.classList.toggle('checked', e.target.checked);
      });
      ul.appendChild(li);
    });

    document.getElementById('grid-view').classList.add('hidden');
    document.getElementById('selection-bar').style.display = 'none';
    document.getElementById('grocery').classList.add('visible');
    document.querySelector('main').scrollTo(0, 0);
  }

  function hideGrocery() {
    document.getElementById('grocery').classList.remove('visible');
    document.getElementById('grid-view').classList.remove('hidden');
    updateSelectionBar();
  }

  // ── Status helper ─────────────────────────────────────────
  function setStatus(type, heading, detail) {
    const icons = { loading: "⏳", error: "⚠️", empty: "🌿" };
    const el = document.getElementById("status");
    el.style.display = "block";
    el.innerHTML = `
      <div class="icon">${icons[type] || "🍳"}</div>
      <p>${heading}</p>
      ${detail ? `<small>${detail}</small>` : ""}
    `;
  }

  // ── Event listeners ───────────────────────────────────────
  document.getElementById("search").addEventListener("input", e => {
    currentQuery = e.target.value;
    renderList(search(currentQuery));
  });

  document.getElementById("btn-back").addEventListener("click", showList);

  document.getElementById("btn-random").addEventListener("click", () => {
    if (!allRecipes.length) return;
    showDetail(allRecipes[Math.floor(Math.random() * allRecipes.length)]);
  });

  document.getElementById("btn-clear-sel").addEventListener("click", () => {
    selectedRecipes.clear();
    document.querySelectorAll(".card.selected").forEach(c => {
      c.classList.remove("selected");
      c.querySelector(".card-select").textContent = "";
    });
    updateSelectionBar();
  });

  document.getElementById("btn-gen-list").addEventListener("click", showGrocery);
  document.getElementById("btn-back-grocery").addEventListener("click", hideGrocery);
  document.getElementById("btn-print").addEventListener("click", () => window.print());

  document.addEventListener("keydown", e => {
    if (e.key === "Escape") {
      if (document.getElementById("grocery").classList.contains("visible")) hideGrocery();
      else showList();
    }
    if (e.key === "/" && !document.getElementById("detail").classList.contains("visible")
                      && !document.getElementById("grocery").classList.contains("visible")) {
      e.preventDefault();
      document.getElementById("search").focus();
    }
  });

  // ── Boot ──────────────────────────────────────────────────
  loadRecipes();
</script>
</body>
</html>
